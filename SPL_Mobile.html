<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>SPL 조회</title>
<style>
:root {
  --bg:#eef2f9; --panel:#fff; --primary:#1a2e5a; --accent:#2a5298;
  --blue:#3b82f6; --text:#1a202c; --sub:#64748b; --bd:#e2e8f0;
  --zone:#daeaf7; --zone-h:#b8d9f0; --zone-s:#a8c8e8;
  --grass:#d4edda; --grass-s:#a8d5b5;
  --ok:#16a34a; --warn:#dc2626; --warn-bg:#fef2f2; --ok-bg:#f0fdf4;
  --shadow:rgba(0,0,0,0.07);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;
  background:var(--bg);color:var(--text);overflow:hidden;}

/* ── 로딩 ── */
#loadingScreen{position:fixed;inset:0;background:var(--primary);display:flex;
  flex-direction:column;align-items:center;justify-content:center;z-index:999;color:#fff;}
#loadingScreen h2{font-size:20px;font-weight:700;margin-bottom:8px;}
#loadingScreen p{font-size:13px;opacity:.7;margin-bottom:28px;}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── 화면 슬라이드 ── */
#app{position:fixed;inset:0;display:flex;overflow:hidden;}
.screen{min-width:100%;height:100%;display:flex;flex-direction:column;
  transition:transform .3s ease;background:var(--bg);}
#screens{display:flex;width:300%;height:100%;
  transition:transform .3s ease;}
#screens.s0{transform:translateX(0);}
#screens.s1{transform:translateX(-33.333%);}
#screens.s2{transform:translateX(-66.666%);}

/* ── 공통 헤더 ── */
.hdr{background:var(--primary);color:#fff;padding:14px 16px 12px;
  flex-shrink:0;display:flex;align-items:center;gap:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.25);}
.hdr-back{background:rgba(255,255,255,.15);border:none;color:#fff;
  width:32px;height:32px;border-radius:8px;font-size:18px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hdr-title{font-size:16px;font-weight:700;flex:1;}
.hdr-sub{font-size:11px;opacity:.65;white-space:nowrap;}
.update-badge{font-size:10px;background:rgba(255,255,255,.18);
  border-radius:20px;padding:2px 8px;white-space:nowrap;}

/* ── 스크롤 영역 ── */
.scroll-body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.scroll-body::-webkit-scrollbar{display:none;}

/* ════ 화면1: 공장 배치도 ════ */
#s-home .hdr{padding-top:max(14px,env(safe-area-inset-top));}
#map-wrap{padding:12px;background:var(--panel);margin:12px;
  border-radius:14px;border:1px solid var(--bd);
  box-shadow:0 2px 8px var(--shadow);}
#map-wrap svg{width:100%;height:auto;display:block;}
/* SVG */
.zone-dept{fill:var(--zone);stroke:var(--zone-s);stroke-width:1;
  cursor:pointer;transition:fill .15s;}
.zone-dept:active{fill:var(--zone-h);}
.zone-grass{fill:var(--grass);stroke:var(--grass-s);stroke-width:1;pointer-events:none;}
.zlabel{font-family:'Malgun Gothic','Apple SD Gothic Neo',system-ui,sans-serif;
  font-size:14px;font-weight:700;text-anchor:middle;dominant-baseline:middle;
  fill:#1e3a5f;pointer-events:none;}
.zlabel-sm{font-size:11px;}
.map-bg{fill:#f1f5f9;}

.home-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 12px 16px;}
.stat-card{background:var(--panel);border-radius:10px;border:1px solid var(--bd);
  padding:12px 14px;box-shadow:0 1px 3px var(--shadow);}
.stat-val{font-size:22px;font-weight:800;color:var(--primary);line-height:1;}
.stat-val.warn{color:#c05621;}.stat-val.danger{color:#c53030;}.stat-val.ok{color:#276749;}
.stat-lbl{font-size:10px;color:var(--sub);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;}

/* ════ 화면2: 부서 장비 그리드 ════ */
.dept-info{padding:10px 14px;background:var(--panel);border-bottom:1px solid var(--bd);
  display:flex;align-items:center;gap:8px;flex-shrink:0;}
.dept-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;
  background:#dbeafe;color:#1e3a8a;}
.dept-badge.warn{background:#fef2f2;color:#c53030;}
.eq-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:12px;}
.eq-card{background:var(--panel);border-radius:12px;border:1px solid var(--bd);
  padding:14px 12px;box-shadow:0 1px 4px var(--shadow);
  cursor:pointer;transition:transform .1s;position:relative;min-height:72px;
  display:flex;flex-direction:column;justify-content:space-between;}
.eq-card:active{transform:scale(.96);}
.eq-card.short{border-color:#fca5a5;background:#fff8f8;}
.eq-name{font-size:13px;font-weight:700;color:var(--primary);line-height:1.3;word-break:break-all;}
.eq-cnt{font-size:11px;color:var(--sub);margin-top:4px;}
.eq-short-badge{display:inline-block;margin-top:6px;font-size:10px;font-weight:700;
  background:var(--warn-bg);color:var(--warn);padding:2px 7px;border-radius:10px;}

/* ════ 화면3: SPL 리스트 ════ */
.spl-search-bar{padding:10px 12px;background:var(--panel);border-bottom:1px solid var(--bd);flex-shrink:0;}
.spl-search-inner{display:flex;align-items:center;gap:8px;
  background:var(--bg);border:1.5px solid var(--bd);border-radius:10px;padding:8px 12px;}
.spl-search-inner:focus-within{border-color:var(--blue);}
.spl-input{flex:1;border:none;background:transparent;font-size:15px;outline:none;color:var(--text);}
.spl-clear{background:none;border:none;color:var(--sub);font-size:18px;cursor:pointer;line-height:1;padding:0;}
.spl-meta{font-size:11px;color:var(--sub);padding:4px 12px 0;flex-shrink:0;}

.spl-item{background:var(--panel);margin:6px 10px;border-radius:12px;
  border:1px solid var(--bd);overflow:hidden;box-shadow:0 1px 3px var(--shadow);}
.spl-item.short{border-color:#fca5a5;}
.spl-item-head{padding:10px 12px 6px;display:flex;justify-content:space-between;align-items:flex-start;}
.spl-itemno{font-family:'Consolas',monospace;font-size:12px;font-weight:700;color:var(--primary);}
.spl-type{font-size:10px;font-weight:700;background:#dbeafe;color:#1e3a8a;
  padding:2px 7px;border-radius:10px;flex-shrink:0;margin-left:6px;}
.spl-model{padding:2px 12px 6px;font-size:13px;font-weight:600;color:var(--text);}
.spl-desc{padding:0 12px 8px;font-size:11px;color:var(--sub);}
.spl-foot{display:flex;border-top:1px solid var(--bd);}
.spl-stock-box{flex:1;text-align:center;padding:8px 4px;border-right:1px solid var(--bd);}
.spl-stock-box:last-child{border-right:none;}
.spl-stock-lbl{font-size:10px;color:var(--sub);display:block;}
.spl-stock-val{font-size:16px;font-weight:800;display:block;margin-top:2px;}
.stock-ok{color:var(--ok);}.stock-warn{color:var(--warn);}

.list-end{text-align:center;color:var(--sub);font-size:12px;padding:20px;margin-bottom:40px;}
.empty{text-align:center;padding:60px 20px;color:var(--sub);}
.empty .icon{font-size:40px;margin-bottom:12px;}
</style>
</head>
<body>

<!-- 로딩 -->
<div id="loadingScreen">
  <h2>SPL 조회</h2>
  <p>데이터 로딩 중...</p>
  <div class="spinner"></div>
</div>

<div id="app" style="display:none">
<div id="screens" class="s0">

  <!-- ════ 화면1: 공장 배치도 ════ -->
  <div class="screen" id="s-home">
    <div class="hdr">
      <div style="flex:1">
        <div class="hdr-title">🏭 TaeguTec SPL 조회</div>
      </div>
      <span class="update-badge" id="updateBadge">—</span>
    </div>
    <div class="scroll-body">
      <div id="map-wrap">
        <svg viewBox="0 0 910 370" xmlns="http://www.w3.org/2000/svg">
          <rect width="910" height="370" rx="10" class="map-bg"/>
          <!-- Row 1 -->
          <rect class="zone-dept" x="10" y="10" width="270" height="100" rx="10" onclick="openDept('IMC ENDMILL')"/>
          <text class="zlabel" x="145" y="60">IMC ENDMILL</text>
          <rect class="zone-dept" x="296" y="10" width="100" height="100" rx="10" onclick="openDept('원료')"/>
          <text class="zlabel" x="346" y="60">원료</text>
          <rect class="zone-dept" x="406" y="10" width="88" height="100" rx="10" onclick="openDept('MC')"/>
          <text class="zlabel" x="450" y="60">M/C</text>
          <rect class="zone-dept" x="504" y="10" width="84" height="100" rx="10" onclick="openDept('금형1')"/>
          <text class="zlabel" x="546" y="60">금형1</text>
          <rect class="zone-dept" x="598" y="10" width="88" height="100" rx="10" onclick="openDept('합금1')"/>
          <text class="zlabel" x="642" y="60">합금1</text>
          <rect class="zone-dept" x="702" y="10" width="100" height="100" rx="10" onclick="openDept('드릴')"/>
          <text class="zlabel" x="752" y="60">드릴</text>
          <rect class="zone-dept" x="812" y="10" width="88" height="100" rx="10" onclick="openDept('세라믹')"/>
          <text class="zlabel" x="856" y="60">세라믹</text>
          <!-- Row 2 -->
          <rect class="zone-dept" x="10" y="126" width="84" height="88" rx="10" onclick="openDept('코팅2')"/>
          <text class="zlabel" x="52" y="170">코팅2</text>
          <rect class="zone-dept" x="10" y="224" width="84" height="42" rx="8" onclick="openDept('QA')"/>
          <text class="zlabel zlabel-sm" x="52" y="245">QA</text>
          <rect class="zone-dept" x="104" y="126" width="84" height="140" rx="10" onclick="openDept('연삭2')"/>
          <text class="zlabel" x="146" y="196">연삭2</text>
          <rect class="zone-dept" x="198" y="126" width="82" height="57" rx="10" onclick="openDept('금형2')"/>
          <text class="zlabel" x="239" y="155">금형2</text>
          <rect class="zone-dept" x="198" y="193" width="82" height="57" rx="10" onclick="openDept('합금2')"/>
          <text class="zlabel" x="239" y="222">합금2</text>
          <!-- 잔디 -->
          <rect class="zone-grass" x="296" y="126" width="310" height="140" rx="10"/>
          <rect class="zone-dept" x="616" y="126" width="76" height="140" rx="10" onclick="openDept('Roll')"/>
          <text class="zlabel" x="654" y="196">Roll</text>
          <rect class="zone-dept" x="702" y="126" width="95" height="66" rx="10" onclick="openDept('연삭1')"/>
          <text class="zlabel" x="749" y="159">연삭1</text>
          <rect class="zone-dept" x="807" y="126" width="93" height="66" rx="10" onclick="openDept('코팅1')"/>
          <text class="zlabel" x="853" y="159">코팅1</text>
          <!-- Row 3 -->
          <rect class="zone-dept" x="10" y="282" width="270" height="78" rx="10" onclick="openDept('가공')"/>
          <text class="zlabel" x="145" y="321">가공</text>
        </svg>
      </div>
      <div class="home-stats" id="homeStats"></div>
    </div>
  </div>

  <!-- ════ 화면2: 부서 장비 그리드 ════ -->
  <div class="screen" id="s-dept">
    <div class="hdr">
      <button class="hdr-back" onclick="goBack(1)">‹</button>
      <div style="flex:1">
        <div class="hdr-title" id="deptTitle">부서</div>
      </div>
      <span class="hdr-sub" id="deptSubtitle"></span>
    </div>
    <div class="dept-info">
      <span id="deptTotalBadge" class="dept-badge"></span>
      <span id="deptShortBadge" class="dept-badge warn" style="display:none"></span>
    </div>
    <div class="scroll-body">
      <div class="eq-grid" id="eqGrid"></div>
    </div>
  </div>

  <!-- ════ 화면3: SPL 리스트 ════ -->
  <div class="screen" id="s-spl">
    <div class="hdr">
      <button class="hdr-back" onclick="goBack(2)">‹</button>
      <div style="flex:1">
        <div class="hdr-title" id="splTitle">장비</div>
      </div>
      <span class="hdr-sub" id="splSubtitle"></span>
    </div>
    <div class="spl-search-bar">
      <div class="spl-search-inner">
        <span>🔍</span>
        <input class="spl-input" id="splInput" type="search"
          placeholder="품번 · 부품명 검색..." autocomplete="off" oninput="filterSPL()">
        <button class="spl-clear" onclick="clearSPL()">×</button>
      </div>
    </div>
    <div class="spl-meta" id="splMeta"></div>
    <div class="scroll-body" id="splList"></div>
  </div>

</div><!-- /screens -->
</div><!-- /app -->

<script>
const DATA_URL = 'https://raw.githubusercontent.com/mysoo0303-afk/SPL-App2/main/spl_data.json';

let allParts = [];
let depts = {};
let currentDept = '';
let currentEq = '';
let currentParts = [];

/* ── 데이터 로드 ── */
async function loadData() {
  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    allParts = data.parts || [];
    depts = data.depts || {};
    document.getElementById('updateBadge').textContent = data.updated || '';
    buildHomeStats();
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
  } catch(e) {
    document.getElementById('loadingScreen').innerHTML =
      '<h2 style="font-size:15px;padding:0 20px;text-align:center">데이터 로드 실패</h2>' +
      '<p style="color:#fca5a5;padding:0 20px;text-align:center">' + e.message + '</p>';
  }
}

/* ── 홈 통계 ── */
function buildHomeStats() {
  const total = allParts.length;
  const eqs = new Set(allParts.map(p => p.eq)).size;
  const short = allParts.filter(p => p.stock <= p.safety && p.safety > 0).length;
  const zero = allParts.filter(p => p.stock === 0).length;
  document.getElementById('homeStats').innerHTML = [
    ['전체 파트', total.toLocaleString(), ''],
    ['장비 수', eqs, ''],
    ['재고 0', zero.toLocaleString(), 'warn'],
    ['청구 필요', short, 'danger'],
  ].map(([l,v,c]) => `<div class="stat-card">
    <div class="stat-val ${c}">${v}</div>
    <div class="stat-lbl">${l}</div>
  </div>`).join('');
}

/* ── 부서 열기 ── */
function openDept(deptKey) {
  currentDept = deptKey;
  const equips = depts[deptKey] || [];

  // 재고부족 집계
  const shortByEq = {};
  const cntByEq = {};
  allParts.forEach(p => {
    if (p.eq) {
      cntByEq[p.eq] = (cntByEq[p.eq] || 0) + 1;
      if (p.stock <= p.safety && p.safety > 0) {
        shortByEq[p.eq] = (shortByEq[p.eq] || 0) + 1;
      }
    }
  });

  const totalShort = equips.reduce((s, e) => s + (shortByEq[e] || 0), 0);

  document.getElementById('deptTitle').textContent = deptKey === 'MC' ? 'M/C' : deptKey;
  document.getElementById('deptSubtitle').textContent = equips.length + '개 장비';
  document.getElementById('deptTotalBadge').textContent = equips.length + '개 장비';

  const sb = document.getElementById('deptShortBadge');
  if (totalShort > 0) {
    sb.textContent = '⚠️ ' + totalShort + '건 부족';
    sb.style.display = 'inline-block';
  } else {
    sb.style.display = 'none';
  }

  if (equips.length === 0) {
    document.getElementById('eqGrid').innerHTML =
      '<div class="empty" style="grid-column:1/-1"><div class="icon">🔧</div><p>장비 정보 없음<br><small>매크로를 다시 실행해주세요</small></p></div>';
  } else {
    document.getElementById('eqGrid').innerHTML = equips.map(eq => {
      const sc = shortByEq[eq] || 0;
      const cnt = cntByEq[eq] || 0;
      return `<div class="eq-card${sc > 0 ? ' short' : ''}" onclick="openEquip('${eq.replace(/'/g,"\\'")}')">
        <div>
          <div class="eq-name">${esc(eq)}</div>
          <div class="eq-cnt">파트 ${cnt}개</div>
        </div>
        ${sc > 0 ? `<span class="eq-short-badge">⚠️ ${sc}건 부족</span>` : ''}
      </div>`;
    }).join('');
  }

  goTo(1);
}

/* ── 장비 SPL 열기 ── */
function openEquip(eqName) {
  currentEq = eqName;
  currentParts = allParts.filter(p => p.eq === eqName);

  document.getElementById('splTitle').textContent = eqName;
  const short = currentParts.filter(p => p.stock <= p.safety && p.safety > 0).length;
  document.getElementById('splSubtitle').textContent =
    currentParts.length + '개' + (short > 0 ? ' · ⚠️' + short : '');

  document.getElementById('splInput').value = '';
  renderSPL(currentParts);
  goTo(2);
}

/* ── SPL 렌더링 ── */
function renderSPL(parts) {
  const el = document.getElementById('splList');
  document.getElementById('splMeta').textContent = parts.length + '개 파트';

  if (!parts.length) {
    el.innerHTML = '<div class="empty"><div class="icon">😶</div><p>검색 결과 없음</p></div>';
    return;
  }

  const show = parts.slice(0, 300);
  el.innerHTML = show.map(p => {
    const isLow = p.stock <= p.safety && p.safety > 0;
    const sc = isLow ? 'stock-warn' : 'stock-ok';
    const desc = [p.part, p.desc1, p.desc2].filter(Boolean).join(' · ');
    return `<div class="spl-item${isLow ? ' short' : ''}">
      <div class="spl-item-head">
        <span class="spl-itemno">${esc(p.itemNo)}</span>
        ${p.type ? `<span class="spl-type">${esc(p.type)}</span>` : ''}
      </div>
      ${p.model ? `<div class="spl-model">${esc(p.model)}</div>` : ''}
      ${desc ? `<div class="spl-desc">${esc(desc)}</div>` : ''}
      <div class="spl-foot">
        <div class="spl-stock-box">
          <span class="spl-stock-lbl">재고</span>
          <span class="spl-stock-val ${sc}">${p.stock}</span>
        </div>
        <div class="spl-stock-box">
          <span class="spl-stock-lbl">안전재고</span>
          <span class="spl-stock-val">${p.safety}</span>
        </div>
      </div>
    </div>`;
  }).join('') + (parts.length > 300 ? `<div class="list-end">300개 표시 중 (전체 ${parts.length}개)</div>` : '<div class="list-end">— 끝 —</div>');
}

/* ── SPL 검색 ── */
function filterSPL() {
  const q = document.getElementById('splInput').value.trim().toLowerCase();
  if (!q) { renderSPL(currentParts); return; }
  const terms = q.split(/\s+/).filter(Boolean);
  const filtered = currentParts.filter(p => {
    const hay = [p.itemNo, p.type, p.part, p.model, p.desc1, p.desc2].join(' ').toLowerCase();
    return terms.every(t => hay.includes(t));
  });
  renderSPL(filtered);
}
function clearSPL() {
  document.getElementById('splInput').value = '';
  renderSPL(currentParts);
}

/* ── 화면 전환 ── */
function goTo(n) {
  document.getElementById('screens').className = 's' + n;
  // 화면 최상단으로
  if (n === 1) document.querySelector('#s-dept .scroll-body').scrollTop = 0;
  if (n === 2) document.getElementById('splList').scrollTop = 0;
}
function goBack(from) {
  goTo(from - 1);
}

/* ── 이스케이프 ── */
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadData();
</script>
</body>
</html>
