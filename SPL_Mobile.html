<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>SPL 조회</title>
<style>
:root {
  --bg:#eef2f9; --panel:#fff; --primary:#1a2e5a; --accent:#2a5298;
  --blue:#3b82f6; --text:#1a202c; --sub:#64748b; --bd:#e2e8f0;
  --zone:#daeaf7; --zone-h:#b8d9f0; --zone-s:#a8c8e8;
  --grass:#d4edda; --grass-s:#a8d5b5;
  --ok:#16a34a; --warn:#dc2626; --warn-bg:#fef2f2; --ok-bg:#f0fdf4;
  --shadow:rgba(0,0,0,0.07);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;
  background:var(--bg);color:var(--text);overflow:hidden;}

/* ── 로딩 ── */
#loadingScreen{position:fixed;inset:0;background:var(--primary);display:flex;
  flex-direction:column;align-items:center;justify-content:center;z-index:999;color:#fff;}
#loadingScreen h2{font-size:20px;font-weight:700;margin-bottom:8px;}
#loadingScreen p{font-size:13px;opacity:.7;margin-bottom:28px;}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── 화면 슬라이드 ── */
#app{position:fixed;inset:0;overflow:hidden;}
.screen{width:100vw;flex-shrink:0;height:100%;display:flex;flex-direction:column;background:var(--bg);}
#screens{display:flex;width:300vw;height:100%;
  transition:transform .3s ease;}
#screens.s0{transform:translateX(0);}
#screens.s1{transform:translateX(-100vw);}
#screens.s2{transform:translateX(-200vw);}

/* ── 공통 헤더 ── */
.hdr{background:var(--primary);color:#fff;padding:14px 16px 12px;
  flex-shrink:0;display:flex;align-items:center;gap:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.25);}
.hdr-back{background:rgba(255,255,255,.15);border:none;color:#fff;
  width:32px;height:32px;border-radius:8px;font-size:18px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hdr-title{font-size:16px;font-weight:700;flex:1;}
.hdr-sub{font-size:11px;opacity:.65;white-space:nowrap;}
.update-badge{font-size:10px;background:rgba(255,255,255,.18);
  border-radius:20px;padding:2px 8px;white-space:nowrap;}

/* ── 스크롤 영역 ── */
.scroll-body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.scroll-body::-webkit-scrollbar{display:none;}

/* ════ 화면1: 공장 배치도 ════ */
#s-home .hdr{padding-top:max(14px,env(safe-area-inset-top));}
#map-wrap{padding:12px;background:var(--panel);margin:12px;
  border-radius:14px;border:1px solid var(--bd);
  box-shadow:0 2px 8px var(--shadow);}
#map-wrap svg{width:100%;height:auto;display:block;}
/* SVG */
.zone-dept{fill:var(--zone);stroke:var(--zone-s);stroke-width:1;
  cursor:pointer;transition:fill .15s;}
.zone-dept:active{fill:var(--zone-h);}
.zone-grass{fill:var(--grass);stroke:var(--grass-s);stroke-width:1;pointer-events:none;}
.zlabel{font-family:'Malgun Gothic','Apple SD Gothic Neo',system-ui,sans-serif;
  font-size:14px;font-weight:700;text-anchor:middle;dominant-baseline:middle;
  fill:#1e3a5f;pointer-events:none;}
.zlabel-sm{font-size:11px;}
.map-bg{fill:#f1f5f9;}


/* ════ 화면2: 부서 장비 그리드 / 배치도 ════ */
.dept-info{padding:10px 14px;background:var(--panel);border-bottom:1px solid var(--bd);
  display:flex;align-items:center;gap:8px;flex-shrink:0;}
.dept-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;
  background:#dbeafe;color:#1e3a8a;}
.dept-badge.warn{background:#fef2f2;color:#c53030;}
/* 카드 그리드 (fallback) */
.eq-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:12px;}
.eq-card{background:var(--panel);border-radius:12px;border:1px solid var(--bd);
  padding:14px 12px;box-shadow:0 1px 4px var(--shadow);
  cursor:pointer;transition:transform .1s;position:relative;min-height:72px;
  display:flex;flex-direction:column;justify-content:space-between;}
.eq-card:active{transform:scale(.96);}
.eq-card.short{border-color:#fca5a5;background:#fff8f8;}
.eq-name{font-size:13px;font-weight:700;color:var(--primary);line-height:1.3;word-break:break-all;}
.eq-cnt{font-size:11px;color:var(--sub);margin-top:4px;}
.eq-short-badge{display:inline-block;margin-top:6px;font-size:10px;font-weight:700;
  background:var(--warn-bg);color:var(--warn);padding:2px 7px;border-radius:10px;}
/* 배치도 테이블 */
.section-label{font-size:11px;font-weight:700;color:var(--sub);
  padding:10px 14px 4px;text-transform:uppercase;letter-spacing:.5px;}
.layout-wrap{overflow:auto;-webkit-overflow-scrolling:touch;
  padding:8px;margin:0 8px 8px;border-radius:12px;
  border:1px solid var(--bd);background:var(--panel);
  box-shadow:0 1px 4px var(--shadow);position:relative;}
.layout-table{border-collapse:collapse;font-size:12px;margin:0 auto;}
.layout-table td{border:none;padding:6px 8px;
  white-space:nowrap;vertical-align:middle;text-align:center;
  min-width:64px;height:44px;}
.layout-table td.lc{background:#dbeafe;color:#1e3a8a;font-weight:700;cursor:pointer;}
.layout-table td.lc:active{background:#93c5fd;}
.layout-table td.lc.lshort{background:#fee2e2;color:#991b1b;}

/* ════ 화면3: SPL 리스트 ════ */
.spl-search-bar{padding:10px 12px;background:var(--panel);border-bottom:1px solid var(--bd);flex-shrink:0;}
.spl-search-inner{display:flex;align-items:center;gap:8px;
  background:var(--bg);border:1.5px solid var(--bd);border-radius:10px;padding:8px 12px;}
.spl-search-inner:focus-within{border-color:var(--blue);}
.spl-input{flex:1;border:none;background:transparent;font-size:15px;outline:none;color:var(--text);}
.spl-clear{background:none;border:none;color:var(--sub);font-size:18px;cursor:pointer;line-height:1;padding:0;}
.spl-meta{font-size:11px;color:var(--sub);padding:4px 12px 0;flex-shrink:0;}

/* ── SPL 리스트 (compact) ── */
.spl-list-wrap{background:var(--panel);margin:8px 10px 16px;
  border-radius:12px;border:1px solid var(--bd);overflow:hidden;
  box-shadow:0 1px 3px var(--shadow);}
.spl-item{padding:10px 14px;border-bottom:1px solid var(--bd);display:flex;
  flex-direction:column;gap:3px;}
.spl-item:last-child{border-bottom:none;}
.spl-item.short{border-left:3px solid var(--warn);}
.spl-main-row{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.spl-itemno{font-family:'Consolas',monospace;font-size:13px;font-weight:700;
  color:var(--primary);flex-shrink:0;}
.spl-stk{font-size:17px;font-weight:800;flex-shrink:0;min-width:32px;text-align:right;}
.spl-model-line{font-size:12px;font-weight:600;color:var(--text);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.spl-desc{font-size:11px;color:var(--sub);overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;}
.stock-ok{color:var(--ok);}.stock-warn{color:var(--warn);}

.list-end{text-align:center;color:var(--sub);font-size:12px;padding:20px;margin-bottom:40px;}
.empty{text-align:center;padding:60px 20px;color:var(--sub);}
.empty .icon{font-size:40px;margin-bottom:12px;}
</style>
</head>
<body>

<!-- 로딩 -->
<div id="loadingScreen">
  <h2>SPL 조회</h2>
  <p>데이터 로딩 중...</p>
  <div class="spinner"></div>
</div>

<div id="app" style="display:none">
<div id="screens" class="s0">

  <!-- ════ 화면1: 공장 배치도 ════ -->
  <div class="screen" id="s-home">
    <div class="hdr">
      <div style="flex:1">
        <div class="hdr-title">🏭 TaeguTec SPL 조회</div>
      </div>
      <span class="update-badge" id="updateBadge">—</span>
    </div>
    <div class="scroll-body">
      <div id="map-wrap">
        <svg viewBox="0 0 370 455" xmlns="http://www.w3.org/2000/svg">
          <rect width="370" height="455" rx="10" class="map-bg"/>
          <!-- 가공 -->
          <rect class="zone-dept" x="10" y="5" width="78" height="135" rx="10" onclick="openDept('가공')"/>
          <text class="zlabel" x="49" y="72">가공</text>
          <!-- IMC ENDMILL -->
          <rect class="zone-dept" x="260" y="5" width="100" height="135" rx="10" onclick="openDept('IMC ENDMILL')"/>
          <text class="zlabel zlabel-sm" x="310" y="72">IMC ENDMILL</text>
          <!-- QA, 코팅2 -->
          <rect class="zone-dept" x="104" y="5" width="42" height="42" rx="8" onclick="openDept('QA')"/>
          <text class="zlabel zlabel-sm" x="125" y="26">QA</text>
          <rect class="zone-dept" x="156" y="5" width="88" height="42" rx="10" onclick="openDept('코팅2')"/>
          <text class="zlabel" x="200" y="26">코팅2</text>
          <!-- 연삭2 -->
          <rect class="zone-dept" x="104" y="52" width="140" height="42" rx="10" onclick="openDept('연삭2')"/>
          <text class="zlabel" x="174" y="73">연삭2</text>
          <!-- 합금2, 금형2 -->
          <rect class="zone-dept" x="120" y="99" width="57" height="41" rx="10" onclick="openDept('합금2')"/>
          <text class="zlabel zlabel-sm" x="148" y="119">합금2</text>
          <rect class="zone-dept" x="187" y="99" width="57" height="41" rx="10" onclick="openDept('금형2')"/>
          <text class="zlabel zlabel-sm" x="215" y="119">금형2</text>
          <!-- 잔디 -->
          <rect class="zone-grass" x="104" y="148" width="140" height="155" rx="10"/>
          <!-- 원료, M/C, 금형1, 합금1, 드릴, 세라믹 -->
          <rect class="zone-dept" x="260" y="148" width="100" height="50" rx="10" onclick="openDept('원료')"/>
          <text class="zlabel" x="310" y="173">원료</text>
          <rect class="zone-dept" x="260" y="203" width="100" height="44" rx="10" onclick="openDept('MC')"/>
          <text class="zlabel" x="310" y="225">M/C</text>
          <rect class="zone-dept" x="260" y="252" width="100" height="42" rx="10" onclick="openDept('금형1')"/>
          <text class="zlabel" x="310" y="273">금형1</text>
          <rect class="zone-dept" x="260" y="299" width="100" height="44" rx="10" onclick="openDept('합금1')"/>
          <text class="zlabel" x="310" y="321">합금1</text>
          <!-- Roll -->
          <rect class="zone-dept" x="104" y="308" width="140" height="38" rx="10" onclick="openDept('Roll')"/>
          <text class="zlabel" x="174" y="327">Roll</text>
          <!-- 연삭1, 드릴 -->
          <rect class="zone-dept" x="178" y="351" width="66" height="47" rx="10" onclick="openDept('연삭1')"/>
          <text class="zlabel zlabel-sm" x="211" y="374">연삭1</text>
          <rect class="zone-dept" x="260" y="351" width="100" height="50" rx="10" onclick="openDept('드릴')"/>
          <text class="zlabel" x="310" y="376">드릴</text>
          <!-- 코팅1, 세라믹 -->
          <rect class="zone-dept" x="178" y="404" width="66" height="46" rx="10" onclick="openDept('코팅1')"/>
          <text class="zlabel zlabel-sm" x="211" y="427">코팅1</text>
          <rect class="zone-dept" x="260" y="406" width="100" height="44" rx="10" onclick="openDept('세라믹')"/>
          <text class="zlabel" x="310" y="428">세라믹</text>
        </svg>
      </div>
    </div>
  </div>

  <!-- ════ 화면2: 부서 장비 그리드 ════ -->
  <div class="screen" id="s-dept">
    <div class="hdr">
      <button class="hdr-back" onclick="goBack(1)">‹</button>
      <div style="flex:1">
        <div class="hdr-title" id="deptTitle">부서</div>
      </div>
      <span class="hdr-sub" id="deptSubtitle"></span>
    </div>
    <div class="dept-info">
      <span id="deptTotalBadge" class="dept-badge"></span>
      <span id="deptShortBadge" class="dept-badge warn" style="display:none"></span>
    </div>
    <div class="scroll-body" id="deptBody"></div>
  </div>

  <!-- ════ 화면3: SPL 리스트 ════ -->
  <div class="screen" id="s-spl">
    <div class="hdr">
      <button class="hdr-back" onclick="goBack(2)">‹</button>
      <div style="flex:1">
        <div class="hdr-title" id="splTitle">장비</div>
      </div>
      <span class="hdr-sub" id="splSubtitle"></span>
    </div>
    <div class="spl-search-bar">
      <div class="spl-search-inner">
        <span>🔍</span>
        <input class="spl-input" id="splInput" type="search"
          placeholder="품번 · 부품명 검색..." autocomplete="off" oninput="filterSPL()">
        <button class="spl-clear" onclick="clearSPL()">×</button>
      </div>
    </div>
    <div class="spl-meta" id="splMeta"></div>
    <div class="scroll-body" id="splList"></div>
  </div>

</div><!-- /screens -->
</div><!-- /app -->

<script>
const DATA_URL = 'https://raw.githubusercontent.com/mysoo0303-afk/SPL-App2/main/spl_data.json';
const STOCK_URL = 'https://docs.google.com/spreadsheets/d/1tAelq8-WQClT2f9U4fsUwxlTLn0sW6e39CCFkZu3YPY/export?format=csv&gid=1876732220';

let allParts = [];
let depts = {};
let layouts = {};
let stockMap = {};
let currentDept = '';
let currentEq = '';
let currentParts = [];

/* ── 데이터 로드 ──
   fetchWithTimeout은 헤더만 커버 → 본문(.json/.text) 중 끊기면 무한대기.
   마스터 AbortController로 헤더+본문 전체를 타임아웃 처리. */
async function loadData() {
  const showErr = (msg) => {
    document.getElementById('loadingScreen').innerHTML =
      '<h2 style="font-size:15px;padding:0 20px;text-align:center">데이터 로드 실패</h2>' +
      '<p style="color:#fca5a5;padding:0 20px;text-align:center">' + msg + '</p>' +
      '<p style="color:#fca5a5;padding:0 20px;text-align:center;font-size:11px">새로고침 후 다시 시도해주세요</p>';
  };
  const setMsg = (t) => {
    const el = document.querySelector('#loadingScreen p');
    if (el) el.textContent = t;
  };

  // ① SPL JSON (GitHub) — 20초 마스터 타임아웃
  const splCtrl = new AbortController();
  const splTimer = setTimeout(() => splCtrl.abort(), 20000);
  try {
    setMsg('SPL 데이터 로딩 중...');
    const r1 = await fetch(DATA_URL + '?t=' + Date.now(), {signal: splCtrl.signal});
    if (!r1.ok) throw new Error('SPL 데이터 로드 실패 (GitHub ' + r1.status + ')');
    setMsg('데이터 파싱 중...');
    const data = await r1.json();          // ← signal이 살아있어 여기서도 abort 가능
    clearTimeout(splTimer);
    allParts = data.parts || [];
    depts    = data.depts  || {};
    layouts  = data.layouts || {};
    document.getElementById('updateBadge').textContent = data.updated || '';
  } catch(e) {
    clearTimeout(splTimer);
    showErr(splCtrl.signal.aborted ? 'GitHub 로딩 시간 초과 (20초)' : e.message);
    return;
  }

  // ② 구글시트 재고 — 8초 타임아웃, 실패해도 앱 계속 실행
  setMsg('재고 데이터 로딩 중...');
  const stCtrl = new AbortController();
  const stTimer = setTimeout(() => stCtrl.abort(), 8000);
  try {
    const r2 = await fetch(STOCK_URL + '&t=' + Date.now(), {signal: stCtrl.signal});
    if (r2.ok) {
      const csv = await r2.text();  // signal 살아있는 상태에서 본문 읽기
      clearTimeout(stTimer);
      csv.split('\n').slice(1).forEach(line => {
        const cols = line.split(',');
        if (cols.length >= 2) {
          const itemNo = cols[0].trim().replace(/^"|"$/g, '');
          const stock  = parseInt(cols[1].trim().replace(/^"|"$/g, ''), 10);
          if (itemNo && !isNaN(stock)) stockMap[itemNo] = stock;
        }
      });
      allParts.forEach(p => {
        if (stockMap.hasOwnProperty(p.itemNo)) p.stock = stockMap[p.itemNo];
      });
    } else {
      clearTimeout(stTimer);
    }
  } catch(e) {
    clearTimeout(stTimer);
    // 재고 실패는 무시 — SPL 구조 데이터로 계속
  }

  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
}


/* ── 부서 열기 ── */
function openDept(deptKey) {
  currentDept = deptKey;
  const equips = depts[deptKey] || [];

  // 재고부족 집계
  const shortByEq = {};
  const cntByEq = {};
  allParts.forEach(p => {
    if (p.eq) {
      cntByEq[p.eq] = (cntByEq[p.eq] || 0) + 1;
      if (p.stock <= p.safety && p.safety > 0) {
        shortByEq[p.eq] = (shortByEq[p.eq] || 0) + 1;
      }
    }
  });

  const totalShort = equips.reduce((s, e) => s + (shortByEq[e] || 0), 0);

  document.getElementById('deptTitle').textContent = deptKey === 'MC' ? 'M/C' : deptKey;
  document.getElementById('deptSubtitle').textContent = equips.length + '개 장비';
  document.getElementById('deptTotalBadge').textContent = equips.length + '개 장비';

  const sb = document.getElementById('deptShortBadge');
  if (totalShort > 0) {
    sb.textContent = '⚠️ ' + totalShort + '건 부족';
    sb.style.display = 'inline-block';
  } else {
    sb.style.display = 'none';
  }

  const body = document.getElementById('deptBody');
  const layData = layouts[deptKey];

  // 카드 그리드 HTML (항상 만들어 놓음)
  const cardGrid = equips.length > 0
    ? '<div class="eq-grid">' + equips.map(eq => {
        const sc = shortByEq[eq] || 0;
        const cnt = cntByEq[eq] || 0;
        return `<div class="eq-card${sc > 0 ? ' short' : ''}" onclick="openEquip('${eq.replace(/'/g,"\\'")}')">
          <div>
            <div class="eq-name">${esc(eq)}</div>
            <div class="eq-cnt">파트 ${cnt}개</div>
          </div>
          ${sc > 0 ? `<span class="eq-short-badge">⚠️ ${sc}건 부족</span>` : ''}
        </div>`;
      }).join('') + '</div>'
    : '<div class="empty"><div class="icon">🔧</div><p>장비 정보 없음</p></div>';

  if (layData && layData.length > 0) {
    body.innerHTML =
      '<div class="section-label">📐 장비 배치도 <span style="font-size:10px;font-weight:400;opacity:.7">(핀치 확대 · 더블탭 복원)</span></div>' +
      renderLayout(layData, shortByEq);

    requestAnimationFrame(() => requestAnimationFrame(() => {
      const wrap  = body.querySelector('.layout-wrap');
      const table = wrap ? wrap.querySelector('.layout-table') : null;
      if (wrap && table) setupLayoutZoom(wrap, table);
    }));
  } else {
    body.innerHTML = cardGrid;
  }

  goTo(1);
}

/* ── 배치도 테이블 렌더링 ──
   0 = colspan/rowspan 덮인 셀(skip) 또는 빈 셀(empty td 렌더 필요).
   두 종류를 구분해서 열 위치 유지, trailing 빈 열 잘라냄. */
function renderLayout(rows, shortByEq) {
  if (!rows || rows.length === 0) return '';

  // Pass 1: covered 위치 계산 + maxCol 탐색
  const covered = new Set(); // "r,c"
  let maxCol = 0;
  for (let r = 0; r < rows.length; r++) {
    for (let c = 0; c < rows[r].length; c++) {
      const cell = rows[r][c];
      if (!cell || typeof cell !== 'object') continue;
      const rs = cell.rs || 1;
      const cs = cell.cs || 1;
      // span이 덮는 나머지 위치 기록
      for (let dr = 0; dr < rs; dr++) {
        for (let dc = 0; dc < cs; dc++) {
          if (dr || dc) covered.add(`${r+dr},${c+dc}`);
        }
      }
      // 콘텐츠가 있는 최대 열
      if (cell.t || cell.lnk || cell.bg) maxCol = Math.max(maxCol, c + cs - 1);
    }
  }

  // Pass 2: maxCol 까지만 렌더
  let html = '<div class="layout-wrap"><table class="layout-table"><tbody>';
  for (let r = 0; r < rows.length; r++) {
    html += '<tr>';
    for (let c = 0; c <= maxCol && c < rows[r].length; c++) {
      const cell = rows[r][c];
      if (cell === 0) {
        if (!covered.has(`${r},${c}`)) html += '<td></td>'; // 빈 셀 → 열 유지
        // covered → skip
        continue;
      }
      if (typeof cell === 'object') {
        const rs = cell.rs || 1;
        const cs = cell.cs || 1;
        const lnk = cell.lnk || '';
        const t   = cell.t   || '';
        const bg  = cell.bg  || '';
        const isShort = lnk && (shortByEq[lnk] || 0) > 0;
        let cls = '', style = '', onclick = '';
        if (lnk) {
          cls = ' class="lc' + (isShort ? ' lshort' : '') + '"';
          onclick = ` onclick="openEquip('${lnk.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')"`;
          if (bg && !isShort) style = ` style="background:#${bg}"`;
        } else if (bg) {
          style = ` style="background:#${bg}"`;
        }
        const rsp = rs > 1 ? ` rowspan="${rs}"` : '';
        const csp = cs > 1 ? ` colspan="${cs}"` : '';
        html += `<td${cls}${style}${onclick}${rsp}${csp}>${esc(t)}</td>`;
      }
    }
    html += '</tr>';
  }
  html += '</tbody></table></div>';
  return html;
}

/* ── 배치도 핀치 줌 ── */
let _lzBaseScale = 1, _lzScale = 1;

function scaleCells(table, scale) {
  const w = Math.max(22, Math.round(64 * scale));
  const h = Math.max(18, Math.round(44 * scale));
  const f = Math.max(8,  Math.round(12 * scale));
  const p = Math.round(5 * scale);
  table.querySelectorAll('td').forEach(td => {
    td.style.minWidth  = w + 'px';
    td.style.height    = h + 'px';
    td.style.fontSize  = f + 'px';
    td.style.padding   = p + 'px ' + (p+2) + 'px';
  });
}

function setupLayoutZoom(wrap, table) {
  // 가로/세로 모두 화면에 맞는 초기 scale 계산
  const availW = wrap.clientWidth - 16;
  const availH = window.innerHeight * 0.62;
  const tw = table.scrollWidth, th = table.scrollHeight;
  _lzBaseScale = Math.min(1, availW / tw, availH / th);
  _lzScale     = _lzBaseScale;
  scaleCells(table, _lzScale);
  wrap.style.overflow  = 'auto';
  wrap.style.maxHeight = '65vh';
  wrap.style.height    = '';

  // 이전 리스너 제거
  if (wrap._lzStart) {
    wrap.removeEventListener('touchstart', wrap._lzStart, {passive:false});
    wrap.removeEventListener('touchmove',  wrap._lzMove,  {passive:false});
    wrap.removeEventListener('touchend',   wrap._lzEnd);
  }
  let pDist = 0, pScaleStart = 1, lastTap = 0;

  wrap._lzStart = e => {
    if (e.touches.length === 2) {
      pDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY);
      pScaleStart = _lzScale;
      e.preventDefault();
    }
  };
  wrap._lzMove = e => {
    if (e.touches.length !== 2) return;
    const d = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY);
    _lzScale = Math.max(_lzBaseScale, Math.min(3, pScaleStart * d / pDist));
    scaleCells(table, _lzScale);
    e.preventDefault();
  };
  wrap._lzEnd = () => {
    const now = Date.now();
    if (now - lastTap < 280) { // 더블탭 → 원래 크기
      _lzScale = _lzBaseScale;
      scaleCells(table, _lzScale);
    }
    lastTap = now;
  };
  wrap.addEventListener('touchstart', wrap._lzStart, {passive:false});
  wrap.addEventListener('touchmove',  wrap._lzMove,  {passive:false});
  wrap.addEventListener('touchend',   wrap._lzEnd);
}

/* ── 장비 SPL 열기 ── */
function openEquip(eqName) {
  currentEq = eqName;
  currentParts = allParts.filter(p => p.eq === eqName);

  document.getElementById('splTitle').textContent = eqName;
  const short = currentParts.filter(p => p.stock <= p.safety && p.safety > 0).length;
  document.getElementById('splSubtitle').textContent =
    currentParts.length + '개' + (short > 0 ? ' · ⚠️' + short : '');

  document.getElementById('splInput').value = '';
  renderSPL(currentParts);
  goTo(2);
}

/* ── SPL 렌더링 ── */
function renderSPL(parts) {
  const el = document.getElementById('splList');
  document.getElementById('splMeta').textContent = parts.length + '개 파트';

  if (!parts.length) {
    el.innerHTML = '<div class="empty"><div class="icon">😶</div><p>검색 결과 없음</p></div>';
    return;
  }

  const show = parts.slice(0, 300);
  el.innerHTML =
    '<div class="spl-list-wrap">' +
    show.map(p => {
      const isLow = p.stock <= p.safety && p.safety > 0;
      const desc = [p.part, p.desc1, p.desc2].filter(Boolean).join(' · ');
      const stk = p.stock != null ? p.stock : '-';
      return `<div class="spl-item${isLow ? ' short' : ''}">
        <div class="spl-main-row">
          <span class="spl-itemno">${esc(p.itemNo)}</span>
          <span class="spl-stk ${isLow ? 'stock-warn' : 'stock-ok'}">${stk}</span>
        </div>
        ${p.model ? `<div class="spl-model-line">${esc(p.model)}</div>` : ''}
        ${desc ? `<div class="spl-desc">${esc(desc)}</div>` : ''}
      </div>`;
    }).join('') +
    '</div>' +
    (parts.length > 300 ? `<div class="list-end">300개 표시 중 (전체 ${parts.length}개)</div>` : '<div class="list-end">— 끝 —</div>');
}

/* ── SPL 검색 ── */
function filterSPL() {
  const q = document.getElementById('splInput').value.trim().toLowerCase();
  if (!q) { renderSPL(currentParts); return; }
  const terms = q.split(/\s+/).filter(Boolean);
  const filtered = currentParts.filter(p => {
    const hay = [p.itemNo, p.type, p.part, p.model, p.desc1, p.desc2].join(' ').toLowerCase();
    return terms.every(t => hay.includes(t));
  });
  renderSPL(filtered);
}
function clearSPL() {
  document.getElementById('splInput').value = '';
  renderSPL(currentParts);
}

/* ── 화면 전환 ── */
function goTo(n) {
  document.getElementById('screens').className = 's' + n;
  // 화면 최상단으로
  if (n === 1) document.querySelector('#s-dept .scroll-body').scrollTop = 0;
  if (n === 2) document.getElementById('splList').scrollTop = 0;
}
function goBack(from) {
  goTo(from - 1);
}

/* ── 이스케이프 ── */
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadData();
